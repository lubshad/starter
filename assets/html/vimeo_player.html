<!DOCTYPE html>
<html>

<head>
    <title>Vimeo Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://player.vimeo.com/api/player.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            border: none;
            background-color: #000;
            width: 100%;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <iframe id="vimeo-player" frameborder="0" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>

    <script>
        // Function to get URL query parameters
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Get video_id from URL
        var videoId = getQueryParam("video_id") ?? "1052952352";

        // Validate and set iframe source
        var iframe = document.getElementById('vimeo-player');
        iframe.src = `https://player.vimeo.com/video/${videoId}?app_id=58479&playsinline=1`;

        // Initialize Vimeo Player
        var player = new Vimeo.Player(iframe);


        function sendtoFlutter(data) {
            if (window.FlutterChannel) {
                FlutterChannel.postMessage(JSON.stringify(data));
            }
        }

        player.on("timeupdate", sendtoFlutter);
        player.on('fullscreenchange', sendtoFlutter);
    </script>

</body>

</html>
